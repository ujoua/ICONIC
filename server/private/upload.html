<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>사진 업로드</title>
</head>

<body>
    <h1>사진 업로드</h1>
    <form action="/photos/upload" method="post" enctype="multipart/form-data">
        <div>
            <label for="photo">사진 파일 *</label>
            <input type="file" name="photo" id="photo" accept="image/*" required />
        </div>
        <div>
            <label for="artist">작가</label>
            <input type="text" name="artist" id="artist" />
        </div>
        <div>
            <label for="title">제목</label>
            <input type="text" name="title" id="title" />
        </div>
        <div>
            <label for="text">설명</label>
            <textarea name="text" id="text" rows="4"></textarea>
        </div>
        <div>
            <label for="tags">태그 (쉼표로 구분)</label>
            <input type="text" name="tags" id="tags" placeholder="예: 풍경, 자연, 여행" />
        </div>
        <div>
            <label for="earliestDate">날짜</label>
            <input type="date" name="earliestDate" id="earliestDate" />
        </div>
        <div>
            <label for="camera">카메라</label>
            <input type="text" name="camera" id="camera" />
        </div>
        <div>
            <label for="materials">재료 (쉼표로 구분)</label>
            <input type="text" name="materials" id="materials" placeholder="예: 디지털, DSLR" />
        </div>
        <div>
            <label for="dimensons">크기/치수</label>
            <input type="text" name="dimensons" id="dimensons" placeholder="예: 1920x1080" />
        </div>
        <button type="submit">Upload</button>
    </form>
</body>

</html>
